<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compass Questionnaire</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Fallback background matching React default bg */
        body {
            background-color: rgba(24,25,26,1);
            color: #e4e6ea;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        /* Custom scrollbar for tooltips */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #242526; 
        }
        ::-webkit-scrollbar-thumb {
            background: #4a4b4c; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #5a5b5c; 
        }

        /* Follow-up question slide-in animation */
        @keyframes slideInUp {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .followup-question {
            animation: slideInUp 0.22s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="app" class="w-full min-h-screen">
        <div class="max-w-3xl mx-auto p-4">
            
            <!-- Controls -->
            <div class="sticky top-0 z-50 bg-[#18191a] pt-2 pb-4 mb-6 border-b border-[#3a3b3c]">
                <div class="flex items-center gap-4 mb-4">
                    <label for="toggleSub" class="hidden flex items-center gap-2 text-sm cursor-pointer select-none">
                        <div class="relative">
                            <input id="toggleSub" type="checkbox" class="sr-only peer" />
                            <div class="w-9 h-5 bg-[#3a3b3c] rounded-full peer-checked:bg-[#1877f2] transition-colors"></div>
                            <div class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full transition-transform peer-checked:translate-x-4"></div>
                        </div>
                        <span>Subcategories titles</span>
                    </label>

                    <div class="ml-auto flex items-center gap-4">
                        <a href="visualization.html" class="text-sm text-[#1877f2] hover:underline flex items-center gap-1.5">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                            Visualize Results
                        </a>
                        <div class="text-sm font-medium"><span id="progressText">0</span>% complete</div>
                    </div>
                </div>
                <div class="h-2 bg-[#3a3b3c] rounded overflow-hidden">
                    <div id="progressBar" class="bg-[#1877f2] h-full transition-all" style="width: 0%;"></div>
                </div>
            </div>

            <!-- Categories Container -->
            <div id="categoriesContainer">
                <!-- Categories will be injected here by JS -->
            </div>

            <!-- Export Button -->
            <button id="exportCsvBtn" class="mt-8 px-6 py-3 bg-[#27ae60] rounded hover:opacity-80 transition-opacity" disabled>
                Download CSV
            </button>
        </div>
    </div>

    <!-- Tooltip Element -->
    <div id="tooltip" class="hidden info-tip-content bg-[#242526] text-[#e4e6ea] p-3 rounded-lg shadow-lg border border-[#3a3b3c] text-sm overflow-auto" style="position: fixed; z-index: 2147483647; max-width: min(680px, calc(100vw - 32px)); max-height: 180px; transform: translate(-50%, -100%);">
        <div id="tooltipText"></div>
        <div class="info-tip-arrow absolute left-1/2 -translate-x-1/2 bottom-[-6px] border-t-[6px] border-t-[#242526] border-x-[6px] border-x-transparent"></div>
    </div>

    <!-- Main Logic -->
    <script src="script.js"></script>
</body>
</html>
